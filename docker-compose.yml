version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: evaluz_db
    restart: always
    environment:
      POSTGRES_USER: evaluz_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
      POSTGRES_DB: evaluz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U evaluz_admin -d evaluz_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: evaluz_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://evaluz_admin:${POSTGRES_PASSWORD:-securepassword123}@db:5432/evaluz_db
      # Optional: Pokud chceme LLM adresu předat natvrdo kontejneru:
      # - VLLM_API_URL=http://your-gpu-server:8000/v1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount folder to persist generated logs or internal SQLite (if fallback)
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
    container_name: evaluz_frontend
    restart: always
    ports:
      - "5173:80" # NGINX bude běžet na 80, ale expose do hostitele dáme např. jako 5173 pro zachování chování. Lze změnit na 80.
    depends_on:
      - backend

volumes:
  pgdata:
